- title: "ETHViz — Ethereum Network Topology Visualization & Private-Net GUI"
  year: "2023"
  description: "Discovered peers from a custom geth light node via Web3's admin.peers(), geolocated IPs, and rendered interactive maps and graphs (React, D3-geo, React-force-graph-3d) backed by a Flask service on AWS EC2. Also built a GUI to connect peers and send transactions on private networks."
